<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Agency System | Dragana Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../styles.css">
</head>
<body data-project="travel-agency">
  <div class="page-shell project-page">
    <a class="back-link" href="../index.html">← Back to portfolio</a>
    <section class="project-hero">
      <p class="eyebrow">WinForms Application</p>
      <h1 id="project-title"></h1>
      <p class="project-summary" id="project-summary"></p>
      <img class="project-main-image" id="project-image" src="" alt="">
      <ul class="project-meta">
        <li><span class="meta-label">Role</span><span class="meta-value" id="project-role"></span></li>
        <li><span class="meta-label">Year</span><span class="meta-value" id="project-year"></span></li>
        <li><span class="meta-label">Stack</span><span class="meta-value" id="project-stack"></span></li>
      </ul>
    </section>
    <section class="project-layout">
      <div class="project-body">
        <article class="project-section panel">
          <h2>The Problem</h2>
          <p id="project-problem"></p>
        </article>
        <article class="project-section panel">
          <h2>The Solution</h2>
          <p id="project-solution"></p>
        </article>
        <article class="project-section panel">
          <h2>Outcomes</h2>
          <ul id="project-outcomes"></ul>
        </article>
      </div>
      <aside class="project-sidebar">
        <article class="meta-card panel">
          <h3>Technology</h3>
          <ul class="tag-list" id="project-tags"></ul>
        </article>
        <article class="gallery-card panel">
          <h2>Gallery</h2>
          <div class="gallery-grid" id="project-gallery"></div>
        </article>
      </aside>
    </section>
    <div class="footer-space"></div>
  </div>
  <script src="../data/projects.js"></script>
  <script src="../scripts/project.js"></script>
</body>
</html>
